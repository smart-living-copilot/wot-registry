services:
  wot-registry-stack:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: registry.dataspace.plaiful.org/demo_fsn/wot-registry-stack:latest
    environment:
      REGISTRY_DATABASE_URL: ${REGISTRY_DATABASE_URL:-sqlite:////data/registry/wot_registry.db}
      INIT_ADMIN_TOKEN: ${INIT_ADMIN_TOKEN}
      WOT_RUNTIME_REGISTRY_TOKEN: ${WOT_RUNTIME_REGISTRY_TOKEN}
      WOT_RUNTIME_API_TOKEN: ${WOT_RUNTIME_API_TOKEN}
      SEARCH_VECTOR_COLLECTION_NAME: ${SEARCH_VECTOR_COLLECTION_NAME:-thing_search}
      SEARCH_VECTOR_STORE_DIR: /data/content/search-index
      SEARCH_INDEXER_EVENTS_GROUP: ${SEARCH_INDEXER_EVENTS_GROUP:-thing_search_indexer}
      SEARCH_INDEXER_RETRY_SECONDS: ${SEARCH_INDEXER_RETRY_SECONDS:-5}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-mxbai-embed-large}
      WOT_RUNTIME_TIMEOUT_SECONDS: ${WOT_RUNTIME_TIMEOUT_SECONDS:-15}
      WOT_RUNTIME_SUBSCRIPTION_TIMEOUT_SECONDS: ${WOT_RUNTIME_SUBSCRIPTION_TIMEOUT_SECONDS:-5}
      CONTENT_STORE_DIR: /data/content
      CONTENT_STORE_DEFAULT_TTL_SECONDS: ${CONTENT_STORE_DEFAULT_TTL_SECONDS:-3600}
      CONTENT_STORE_CLEANUP_INTERVAL_SECONDS: ${CONTENT_STORE_CLEANUP_INTERVAL_SECONDS:-60}
      REGISTRY_PUBLIC_URL: ${REGISTRY_PUBLIC_URL:-http://localhost:8000}
      WOT_SUBSCRIPTION_SETUP_TIMEOUT_MS: ${WOT_SUBSCRIPTION_SETUP_TIMEOUT_MS:-0}
      WOT_INLINE_PAYLOAD_MAX_BYTES: ${WOT_INLINE_PAYLOAD_MAX_BYTES:-65536}
      WOT_OFFLOADED_PAYLOAD_TTL_SECONDS: ${WOT_OFFLOADED_PAYLOAD_TTL_SECONDS:-86400}
    ports:
      - "8000:8000"
    volumes:
      - content-store:/data/content
      - wot-registry-data:/data/registry
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

volumes:
  content-store:
  wot-registry-data:
